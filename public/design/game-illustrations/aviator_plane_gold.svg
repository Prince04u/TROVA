<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Lucky Nova Gold Aviator Supersonic Jet">
  <defs>
    <!-- Premium Metallic Gold Surface Gradient -->
    <linearGradient id="goldMetallicMain" x1="10" y1="10" x2="118" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFBF0"/>
      <stop offset="15%" stop-color="#FCE89C"/>
      <stop offset="35%" stop-color="#E2BD44"/>
      <stop offset="50%" stop-color="#B78F26"/>
      <stop offset="68%" stop-color="#F7DF88"/>
      <stop offset="85%" stop-color="#CE9B21"/>
      <stop offset="100%" stop-color="#FFF1C2"/>
    </linearGradient>
    
    <!-- Gold Wing & Panel Highlight Gradient -->
    <linearGradient id="goldMetalShine" x1="20" y1="90" x2="90" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#B58D21"/>
      <stop offset="45%" stop-color="#FCDD74"/>
      <stop offset="55%" stop-color="#FFFDF7"/>
      <stop offset="75%" stop-color="#EAA61E"/>
      <stop offset="100%" stop-color="#7A560B"/>
    </linearGradient>

    <!-- Cockpit Glass Gradient (Dark Luxury Glass with Gold Tint) -->
    <linearGradient id="cockpitGlass" x1="50" y1="40" x2="80" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A1505"/>
      <stop offset="40%" stop-color="#3D3210"/>
      <stop offset="70%" stop-color="#8C7326"/>
      <stop offset="100%" stop-color="#FCDD74"/>
    </linearGradient>

    <!-- Deep Shadow for Engine/Turbine area -->
    <linearGradient id="engineDark" x1="15" y1="50" x2="45" y2="70" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080808"/>
      <stop offset="100%" stop-color="#2D2305"/>
    </linearGradient>

    <!-- Soft Golden Ambient Glow Filter -->
    <filter id="premiumGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="
          1 0 0 0 0.83
          0 1 0 0 0.68
          0 0 1 0 0.22
          0 0 0 0.65 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ambient Golden Glow -->
  <g filter="url(#premiumGlow)">
    <!-- Propulsion Afterburner Glow -->
    <ellipse cx="22" cy="74" rx="14" ry="7" fill="#FFA500" opacity="0.65" transform="rotate(-15 22 74)"/>
    <ellipse cx="20" cy="74" rx="8" ry="4" fill="#FFE57F" opacity="0.9"/>

    <!-- Left Wing (Far side) -->
    <path fill="url(#goldMetalShine)" d="M54 36 L78 20 L84 22 L68 45 Z" opacity="0.85"/>
    
    <!-- Main Jet Fuselage Structure -->
    <!-- Nose cone, fuselage body, cabin contour -->
    <path fill="url(#goldMetallicMain)" d="M120 54 C120 54 104 57 90 62 C78 66 60 70 42 74 C30 76.5 24 74 24 74 L20 68 L24 64 C35 60 70 52 86 48 C98 45 112 48 120 54 Z"/>
    
    <!-- Cockpit Glass Window Canopy -->
    <path fill="url(#cockpitGlass)" d="M96 52 C94 51.5 86 52.5 80 54 C74 55.5 76 58 84 57 C90 56 95 54 96 52 Z"/>

    <!-- Right Main Swept-back Wing (Near side) -->
    <path fill="url(#goldMetalShine)" d="M84 57 L44 94 L36 94 L58 64 C64 61.5 74 59.5 84 57 Z" filter="drop-shadow(0 4px 6px rgba(0,0,0,0.3))"/>
    
    <!-- Wing Panel Line details -->
    <path fill="none" stroke="#FFF7D1" stroke-width="0.8" opacity="0.4" d="M78 58.5 L46 88 M80 58 L54 78"/>

    <!-- Jet Engine Intake / Turbine Housing -->
    <path fill="url(#engineDark)" d="M48 68 C44 70 38 73 34 73 C28 73 24 68 28 66 C32 64.5 42 66 48 68 Z"/>

    <!-- Vertical Tail Stabilizer Fin -->
    <path fill="url(#goldMetallicMain)" d="M30 67 L16 35 L26 33 L40 62 Z"/>
    <!-- Tail Fin Trim Detail -->
    <path fill="url(#goldMetalShine)" d="M22 34.5 L18 34.8 L28 54 L32 53.5 Z"/>

    <!-- Rear Horizontal Elevator Wing -->
    <path fill="url(#goldMetalShine)" d="M25 72 L12 80 L10 78 L20 70 Z"/>

    <!-- Fuselage panel lines -->
    <path fill="none" stroke="#684C00" stroke-width="0.5" d="M90 62 C78 66 60 70 42 74"/>
    <path fill="none" stroke="#FFF7D1" stroke-width="0.6" opacity="0.3" d="M110 54.5 C102 56 94 58 88 59"/>
  </g>
</svg>
